version: '3.8'

services:
  db:
    image: postgres:latest
    restart: always
    environment:
      # Тут мы создаем базу и ГЛАВНОГО пользователя
      POSTGRES_DB: monitoring_db
      POSTGRES_USER: user_devops
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  bot:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: monitoring_db
      DB_USER: user_devops
      DB_PASSWORD: password123

  web:
    build: ./web_app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: monitoring_db
      DB_USER: user_devops
      DB_PASSWORD: password123
