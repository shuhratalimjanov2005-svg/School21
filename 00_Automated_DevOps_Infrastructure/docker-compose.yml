version: '3.8'

services:
  # Наша база данных (SQL)
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: monitoring_db
      POSTGRES_USER: user_devops
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # ИСПРАВЛЕНИЕ: монтируем родительскую папку, а не саму data
      - ./data/db:/var/lib/postgresql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_devops -d monitoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Наш бот
  bot:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: monitoring_db
      DB_USER: user_devops
      DB_PASSWORD: password123

  # Наше веб-приложение
  web:
    build: ./web_app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: monitoring_db
      DB_USER: user_devops
      DB_PASSWORD: password123
